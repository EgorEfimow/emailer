version: "2"
run:
  timeout: 5m
  tests: true
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gocyclo
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocyclo:
      min-complexity: 15
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
        text: "Function length"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
severity:
  default: warning
