name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. v1.2.3)'
        required: true

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history + tags so version info / changelogs can be
          # generated correctly, and so a manually-dispatched run can check
          # out the requested tag.
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify ref is a tag
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::'$TAG' is not a valid tag on this repo. Did you 'git push origin $TAG'?"
            exit 1
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          build() {
            local goos=$1 goarch=$2 out=$3
            echo "Building $out ($goos/$goarch)..."
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -ldflags="-s -w -X main.version=${RELEASE_TAG}" \
              -o "dist/$out" ./cmd/emailer
          }
          build linux   amd64 emailer-linux-amd64
          build linux   arm64 emailer-linux-arm64
          build windows amd64 emailer-windows-amd64.exe
          build darwin  amd64 emailer-darwin-amd64
          build darwin  arm64 emailer-darwin-arm64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/emailer-linux-amd64
            dist/emailer-linux-arm64
            dist/emailer-windows-amd64.exe
            dist/emailer-darwin-amd64
            dist/emailer-darwin-arm64
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
