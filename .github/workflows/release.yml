name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build for Linux
        run: |
          GOOS=linux GOARCH=amd64 go build -o emailer-linux-amd64 ./cmd/emailer
          GOOS=linux GOARCH=arm64 go build -o emailer-linux-arm64 ./cmd/emailer
      - name: Build for Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -o emailer-windows-amd64.exe ./cmd/emailer
      - name: Build for macOS
        run: |
          GOOS=darwin GOARCH=amd64 go build -o emailer-darwin-amd64 ./cmd/emailer
          GOOS=darwin GOARCH=arm64 go build -o emailer-darwin-arm64 ./cmd/emailer
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            emailer-linux-amd64
            emailer-linux-arm64
            emailer-windows-amd64.exe
            emailer-darwin-amd64
            emailer-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}